<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log In | Vitalog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#dcdad3",
                      "surface-container-highest": "#e4e2dc",
                      "surface-container": "#f0eee7",
                      "primary-container": "#567c3d",
                      "on-primary": "#ffffff",
                      "background": "#fbf9f2",
                      "on-tertiary": "#ffffff",
                      "surface": "#fbf9f2",
                      "on-primary-fixed-variant": "#2c4f15",
                      "on-secondary-container": "#3b6c51",
                      "primary-fixed": "#c4efa3",
                      "on-surface": "#1b1c18",
                      "tertiary-fixed-dim": "#ffb691",
                      "secondary-container": "#b6ecc9",
                      "on-tertiary-fixed": "#341100",
                      "surface-tint": "#43682b",
                      "primary": "#3e6327",
                      "on-surface-variant": "#414943",
                      "surface-bright": "#fbf9f2",
                      "on-tertiary-fixed-variant": "#723612",
                      "on-error-container": "#93000a",
                      "surface-container-high": "#eae8e1",
                      "on-secondary-fixed-variant": "#1d5036",
                      "outline-variant": "#c0c9c0",
                      "tertiary-container": "#a75f38",
                      "primary-fixed-dim": "#a8d38a",
                      "tertiary": "#894823",
                      "surface-container-lowest": "#ffffff",
                      "surface-variant": "#e4e2dc",
                      "secondary-fixed-dim": "#9dd2b1",
                      "outline": "#717972",
                      "on-error": "#ffffff",
                      "on-background": "#1b1c18",
                      "on-primary-container": "#e9ffd4",
                      "secondary": "#36684c",
                      "surface-container-low": "#f6f4ed",
                      "on-primary-fixed": "#0a2100",
                      "error": "#ba1a1a",
                      "on-secondary-fixed": "#002111",
                      "error-container": "#ffdad6",
                      "secondary-fixed": "#b9efcc",
                      "on-tertiary-container": "#fff6f3",
                      "inverse-on-surface": "#f3f1ea",
                      "inverse-surface": "#30312c",
                      "on-secondary": "#ffffff",
                      "tertiary-fixed": "#ffdbcb",
                      "inverse-primary": "#a8d38a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Noto Serif", "serif"],
                      "body": ["Manrope", "sans-serif"],
                      "label": ["Manrope", "sans-serif"]
              }
            },
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        .font-serif { font-family: 'Noto Serif', serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="flex min-h-screen w-full">
<!-- Left Panel: Brand Experience (55%) -->
<section class="hidden lg:flex w-[55%] bg-[#2D5016] relative flex-col justify-between p-16" style="background-color: #2D5016;">
<div class="relative z-10">
<div class="flex items-center gap-2">
<span class="text-white text-3xl font-serif font-bold tracking-tight">Vitalog</span>
</div>
</div>
<div class="relative z-10 max-w-xl">
<h1 class="text-white font-serif text-5xl leading-tight mb-8">
                Your health has a story. Let's read it together.
            </h1>
<figure class="mt-12 space-y-4">
<blockquote class="text-white/80 text-xl font-light italic leading-relaxed">
                    "The clarity Vitalog provides is like having a doctor in my pocket."
                </blockquote>
<figcaption class="text-white font-medium tracking-wide">
                    — Rahul, Bangalore
                </figcaption>
</figure>
</div>
<div class="relative z-10">
<p class="text-white/60 text-sm tracking-widest uppercase">The Mindful Curator</p>
</div>
</section>
<!-- Right Panel: Authentication (45%) -->
<section class="w-full lg:w-[45%] bg-[#FAFAF7] flex flex-col items-center justify-center p-8 md:p-12">
<div class="w-full max-w-[400px] flex flex-col items-center">
<!-- Logo Mark -->
<div class="mb-12">
<div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="energy_savings_leaf">energy_savings_leaf</span>
</div>
</div>
<!-- Tab Toggle -->
<nav class="flex w-full mb-10 border-b border-outline-variant/30">
<button class="flex-1 py-4 text-sm font-semibold text-outline hover:text-primary transition-colors">
                    Sign up
                </button>
<button class="flex-1 py-4 text-sm font-semibold text-primary border-b-2 border-primary">
                    Log in
                </button>
</nav>
<!-- Form -->
<form class="w-full space-y-6">
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider px-1" for="email">Email Address</label>
<input class="w-full bg-surface-container-highest border-0 rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300" id="email" name="email" placeholder="name@domain.com" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full bg-surface-container-highest border-0 rounded-xl px-4 py-3.5 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-[#4A7C5F] hover:bg-[#3E6327] text-white font-semibold py-4 rounded-full transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-[#4A7C5F]/10" type="submit">
                    Log in
                </button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-xs text-outline font-medium uppercase tracking-widest whitespace-nowrap">or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- OAuth -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/50 hover:bg-surface-container-low transition-colors py-3.5 rounded-full">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Continue with Google</span>
</button>
<!-- Footer -->
<p class="mt-12 text-sm text-on-surface-variant">
                New to Vitalog? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</section>
</main>
<footer class="fixed bottom-0 w-full lg:w-[45%] right-0 py-6 px-12 flex justify-center lg:justify-between items-center bg-transparent pointer-events-none">
<div class="flex gap-6 pointer-events-auto">
<a class="text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</footer>
</body></html>
